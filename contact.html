<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Kontakt - Retro Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #222; color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-warning">
    <div class="container">
        <a class="navbar-brand text-warning" href="index.html">RETRO HUB</a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Hem</a></li>
                <li class="nav-item"><a class="nav-link" href="bird.html">Retro Bird</a></li>
                <li class="nav-item"><a class="nav-link" href="snake.html">Snake</a></li>
                <li class="nav-item"><a class="nav-link" href="pong.html">Pong</a></li>
                <li class="nav-item"><a class="nav-link active" href="contact.html">Kontakt</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 card bg-dark text-white border-warning p-4">
            <h2 class="text-warning mb-4">Kontakta Oss</h2>
            <p>Har du förslag på nya retrospel? Skriv till oss!</p>
            
            <form id="contactForm">
                <div class="mb-3">
                    <label class="form-label">Namn</label>
                    <input type="text" id="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">E-post</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Ditt meddelande</label>
                    <textarea id="message" class="form-control" rows="4" required></textarea>
                </div>
                <button type="submit" class="btn btn-warning w-100">Skicka Meddelande</button>
            </form>
            <div id="feedback" class="mt-3 text-success" style="display:none;">
                Tack! Vi har tagit emot ditt meddelande.
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById("contactForm").addEventListener("submit", function(e) {
        e.preventDefault(); // Stoppar sidan från att laddas om
        
        // Här kan du lägga till logik för att validera om du vill
        document.getElementById("contactForm").style.display = "none";
        document.getElementById("feedback").style.display = "block";
    });
</script>
</body>
</html>
