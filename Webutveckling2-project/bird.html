<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-warning">
    <div class="container">
        <a class="navbar-brand text-warning" href="index.html">RETRO HUB</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">

    <h1>RETRO BIRD</h1>

    <div class="card bg-dark border-warning p-3 mt-2">
        <input type="text" id="playerName" class="form-control mb-2" placeholder="Ditt namn">
        <button class="btn btn-warning" onclick="saveName()">Spara Namn</button>
    </div>
</div>
